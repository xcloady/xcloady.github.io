<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!--meta name="viewport" content="width=device-width, initial-scale=1.0"-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <!-- Enlace al Favicon ICO -->
    <link rel="icon" type="image/svg+xml" href="assets/ico/favicon.ico">
    <title>xcloady | Portfolio</title>

    <!-- ========================================== -->
    <!-- Etiquetas SEO Básicas                      -->
    <!-- ========================================== -->
    <meta name="author" content="Sergio Cubero León (xcloady)">
    
    <!-- En la descripción usamos la fórmula "también conocido como" -->
    <meta name="description" content="Portfolio oficial de Sergio Cubero León, desarrollador de software también conocido como xcloady. Especializado en nuevas tecnologías, código limpio y soluciones eficientes.">
    
    <!-- Agrupamos combinaciones de búsqueda comunes -->
    <meta name="keywords" content="Sergio Cubero León, Sergio Cubero, xcloady, Sergio Cubero xcloady, portfolio xcloady, desarrollador de software, software developer, Bash, C++, React Native, Docker, Python, Java">
    
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#050505">


    <!-- ========================================== -->
    <!-- Open Graph (Redes Sociales)                -->
    <!-- ========================================== -->
    <meta property="og:type" content="profile">
    <meta property="og:title" content="Sergio Cubero León (xcloady) | Software Developer">
    <meta property="og:description" content="Portfolio de Sergio Cubero León (xcloady). Desarrollador de software especializado en nuevas tecnologías.">
    <meta property="og:url" content="https://xcloady.github.io/">
    <meta property="og:image" content="https://xcloady.github.io/assets/img/events/congreso_DES.png"> 
    <!-- Etiquetas específicas de perfil para redes sociales -->
    <meta property="profile:first_name" content="Sergio">
    <meta property="profile:last_name" content="Cubero León">
    <meta property="profile:username" content="xcloady">

    <!-- ========================================== -->
    <!-- DATOS ESTRUCTURADOS PARA GOOGLE (JSON-LD)  -->
    <!-- Esta es la forma oficial de vincular alias -->
    <!-- ========================================== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Sergio Cubero León",
      "alternateName": "xcloady",
      "jobTitle": "Software Developer",
      "description": "Funcionario de Carrera y Desarrollador de software especializado en nuevas tecnologías. Apasionado por el código limpio, la optimización y la creación de soluciones eficientes.",
      "url": "https://xcloady.github.io/",
      "sameAs": [
        "https://es.linkedin.com/in/xcloady",
        "https://github.com/xcloady"
      ]
    }
    </script>


    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <!--script src="https://unpkg.com/lucide@latest"></script-->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- Animate.css for entrance animations -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Font Awesome via CDN (Para los iconos de GitHub y LinkedIn) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="selection:bg-[var(--color-terminal-green)] selection:text-[var(--color-terminal-bg)]">
    
    <div id="root"></div>
    <div id="modal-root"></div>

    <script type="module" src="index.js"></script>
</body>
</html>
